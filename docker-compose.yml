version: '3.8'

services:
  stm-agent:
    build: .
    container_name: stm-agent
    restart: unless-stopped
    # Das Volume-Mount wurde entfernt, da Portainer relative Pfade im Editor nicht 
    # auflösen kann, wenn die Datei nicht manuell im Portainer-Volume abgelegt wurde.
    # Die Konfiguration wird jetzt direkt beim Build in das Image kopiert.
    environment:
      - STM_CONFIG_FILE=/app/config.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
